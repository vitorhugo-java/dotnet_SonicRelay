# Coturn is configured entirely through the command-line args below; no
# turnserver.conf is mounted (the "Cannot find config file" warning at startup
# is expected and harmless).
#
# NETWORKING: coturn runs with `network_mode: host`. A TURN relay MUST NOT sit
# behind Docker's bridge/userland proxy: publishing the UDP relay range through
# docker-proxy rewrites the source address of every packet, forwards the range
# unreliably, and drops UDP under load. The symptoms are exactly "relay never
# connects, only direct works" and "the connection keeps dropping". Host
# networking lets coturn bind the public interface directly, see real client
# source addresses, and serve the whole relay port range natively. Because of
# this the container publishes its ports itself — there is no `ports:` mapping
# and no user-defined network. Open 3478/udp, 3478/tcp, 5349/tcp and the
# ${TURN_MIN_PORT}-${TURN_MAX_PORT}/udp relay range on the host firewall.
#
# AUTH: use only `use-auth-secret` (coturn's TURN REST API / time-limited
# credentials). Do NOT also pass `lt-cred-mech` — combining the two breaks
# authentication of the HMAC credentials the API issues, and relay allocations
# get rejected. The API computes the matching credential as
# Base64(HMAC-SHA1(TURN_STATIC_AUTH_SECRET, "<expiry>:<userId>")).
#
# The same .env used by docker-compose.prod.yml must define, in addition to
# the TURN_* variables consumed here, the ICE configuration the API serves to
# clients at GET /api/webrtc/ice-servers:
#   TURN_STATIC_AUTH_SECRET=<shared secret, also used by the API for HMAC credentials>
#   TURN_URIS=turn:<public-host>:3478?transport=udp,turn:<public-host>:3478?transport=tcp,turns:<public-host>:5349?transport=tcp
#   TURN_CREDENTIAL_TTL_SECONDS=3600   # optional, defaults to 3600
#   STUN_URIS=stun:<public-host>:3478  # optional, defaults to Google STUN
#
# TLS: the turns:5349 listener needs a certificate. Mount a fullchain/privkey
# pair and add `--cert=<path> --pkey=<path>`, otherwise drop the turns: entry
# from TURN_URIS. Plain turn: on 3478 (udp/tcp) works without a certificate.
#
# PROMETHEUS: --prometheus exposes coturn's native metrics on port 9641 (no
# ports: mapping needed — network_mode: host already makes it reachable).
# Keep 9641 closed on the host firewall to everything except the Prometheus
# scrape source; it is not meant to be public.
services:
  coturn:
    image: coturn/coturn:${COTURN_VERSION:-latest}
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --realm=${TURN_REALM:?TURN_REALM is required}
      - --server-name=${TURN_REALM:?TURN_REALM is required}
      - --external-ip=${TURN_EXTERNAL_IP:?TURN_EXTERNAL_IP is required}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET:?TURN_STATIC_AUTH_SECRET is required}
      - --no-multicast-peers
      # Never let a relay reach the host's own loopback/LAN or cloud metadata.
      # WebRTC peers are always reachable at public addresses, so denying the
      # private ranges is safe and blocks the relay from proxying into internal
      # services now that coturn shares the host network namespace.
      - --denied-peer-ip=0.0.0.0-0.255.255.255
      - --denied-peer-ip=10.0.0.0-10.255.255.255
      - --denied-peer-ip=127.0.0.0-127.255.255.255
      - --denied-peer-ip=169.254.0.0-169.254.255.255
      - --denied-peer-ip=172.16.0.0-172.31.255.255
      - --denied-peer-ip=192.168.0.0-192.168.255.255
      - --log-file=stdout
      - --simple-log
      - --prometheus
