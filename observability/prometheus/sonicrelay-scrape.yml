# Prometheus scrape snippet for the SonicRelay API (issue #21).
# Add this job to your existing Prometheus `scrape_configs:`.
# The API exposes Prometheus metrics anonymously at /metrics.
- job_name: sonicrelay-api
  metrics_path: /metrics
  static_configs:
    - targets:
        # Container/service name and the API's listening port.
        - sonicrelay-api:8080
      labels:
        service: sonicrelay-api

# Prometheus scrape snippet for coturn's native metrics (connection-loss-logging work).
# Add this job alongside the sonicrelay-api job above.
- job_name: sonicrelay-coturn
  metrics_path: /metrics
  static_configs:
    - targets:
        # Compose service name for local/dev scraping; use the production host:9641 in prod.
        - coturn:9641
      labels:
        service: sonicrelay-coturn
