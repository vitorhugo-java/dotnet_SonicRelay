services:
  api:
    profiles: ["prod"]
    image: ${API_IMAGE:-ghcr.io/vitorhugo-java/sonicrelay-api:latest}
    build: null
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Swagger__Enabled: "false"
      Serilog__MinimumLevel: Information
    expose:
      - "8080"
    restart: always

  postgres:
    profiles: ["prod"]
    ports: []
    restart: always

  redis:
    profiles: ["prod"]
    ports: []
    restart: always

  # WARNING: this all-in-one stack publishes the coturn relay through Docker's
  # bridge/userland proxy. That is fine for STUN and for reaching 3478, but the
  # UDP relay range below is forwarded by docker-proxy, which rewrites packet
  # source addresses and drops UDP under load — relay allocations then fail
  # ("only direct connects") and live connections keep dropping. For a real TURN
  # relay, run coturn with host networking; see deploy/docker-compose.prodcoturn.yml
  # (network_mode: host) and use that alongside this stack instead of the coturn
  # service here.
  coturn:
    profiles: ["prod"]
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
      - "9641:9641"
    restart: always

  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    container_name: sonicrelay-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - sonicrelay
    restart: always
