# NOTE: this file is NOT used by the production deployment. Coturn is
# configured via command-line arguments in deploy/docker-compose.prodcoturn.yml
# (this file is not mounted into the container, and coturn does not expand
# ${VAR} placeholders in config files). Kept only as a reference of the
# intended settings.
listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=${TURN_STATIC_AUTH_SECRET}
realm=${TURN_REALM}
no-multicast-peers
no-cli
min-port=49160
max-port=49200
